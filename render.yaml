services:
  - type: web
    runtime: docker
    name: chenglang-homepage
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    disk:
      name: visitor-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /data
      - key: VISITOR_DEDUPE_MINUTES
        value: 30
      - key: GEO_LOOKUP_TIMEOUT_MS
        value: 3500
      - key: ANALYTICS_ADMIN_TOKEN
        generateValue: true
